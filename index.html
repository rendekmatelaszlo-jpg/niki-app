<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIKI 7.0</title>
  <style>
    :root {
      --bg1: #18051f;
      --bg2: #0d1020;
      --card: rgba(17, 17, 28, 0.85);
      --border: rgba(160, 120, 255, 0.18);
      --text: #f6f0ff;
      --muted: #b9afd0;
      --accent: #a855f7;
      --accent2: #7c3aed;
      --user: #ffffff;
      --userText: #111111;
      --bot: #24243a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #40105f 0%, var(--bg1) 28%, var(--bg2) 100%);
      min-height: 100vh;
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px 24px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      overflow: hidden;
    }
    .hero {
      padding: 22px 18px 18px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .avatarWrap {
      position: relative;
      width: 124px;
      height: 124px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(168,85,247,.30), rgba(91,33,182,.24));
      border: 1px solid rgba(255,255,255,.08);
      overflow: visible;
    }
    .aura, .aura2 {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,.52) 0%, rgba(168,85,247,.12) 42%, rgba(168,85,247,0) 70%);
      filter: blur(10px);
      animation: pulse 3.2s infinite ease-in-out;
    }
    .aura2 {
      inset: -10px;
      opacity: .65;
      animation-delay: .8s;
    }
    @keyframes pulse {
      0%,100% { transform: scale(.96); opacity: .66; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    .avatar {
      position: relative;
      font-size: 60px;
      z-index: 2;
      animation: idle 4s infinite ease-in-out;
    }
    .avatar.speaking { animation: talk .55s infinite ease-in-out; }
    @keyframes idle { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-3px);} }
    @keyframes talk { 0%,100%{ transform: scale(1) translateY(0);} 50%{ transform: scale(1.06) translateY(-2px);} }
    .eyeGlow {
      position: absolute;
      width: 56px;
      height: 18px;
      top: 49px;
      left: 34px;
      border-radius: 20px;
      background: radial-gradient(circle, rgba(192,132,252,.85), rgba(192,132,252,0));
      opacity: .35;
      z-index: 1;
      animation: blinkGlow 2.8s infinite ease-in-out;
    }
    @keyframes blinkGlow { 0%,100%{opacity:.2;} 50%{opacity:.55;} }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .2px;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .statusRow {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 16px 14px;
    }
    .chip {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text);
    }
    .controls {
      padding: 14px 16px;
      display: grid;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button, .toggle {
      border: 0;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .switch {
      width: 52px;
      height: 30px;
      border-radius: 99px;
      background: rgba(255,255,255,.12);
      position: relative;
      transition: .25s ease;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .switch::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: white;
      transition: .25s ease;
    }
    .switch.on { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .switch.on::after { left: 25px; }
    .waves {
      height: 18px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
      visibility: hidden;
    }
    .waves.on { visibility: visible; }
    .bar {
      width: 4px;
      background: linear-gradient(180deg, #d8b4fe, #a855f7);
      border-radius: 99px;
      animation: wave .8s infinite ease-in-out;
    }
    .bar:nth-child(2){ animation-delay: .1s;}
    .bar:nth-child(3){ animation-delay: .2s;}
    .bar:nth-child(4){ animation-delay: .3s;}
    .bar:nth-child(5){ animation-delay: .4s;}
    @keyframes wave { 0%,100%{height:6px;} 50%{height:18px;} }
    .chat {
      display: flex;
      flex-direction: column;
      height: 52vh;
      min-height: 360px;
    }
    .messages {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(0,0,0,.10);
    }
    .msg {
      max-width: 86%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .botMsg { background: var(--bot); color: var(--text); }
    .userMsg { background: var(--user); color: var(--userText); margin-left: auto; }
    .thinking { opacity: .84; }
    .inputRow {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    input {
      flex: 1;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.22);
      color: var(--text);
      padding: 14px 15px;
      font-size: 14px;
      outline: none;
    }
    .send {
      min-width: 94px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-weight: 700;
    }
    .footer {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="hero">
        <div class="avatarWrap">
          <div class="aura"></div>
          <div class="aura2"></div>
          <div class="eyeGlow"></div>
          <div id="avatar" class="avatar">👩</div>
        </div>
        <div id="waves" class="waves">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <h1>NIKI 7.0</h1>
        <div class="sub">fiatalos, lágy, női AI asszisztens • realisztikus + futurisztikus stílus</div>
      </div>

      <div class="statusRow">
        <div class="chip" id="moodChip">Hangulat: Nyugodt</div>
        <div class="chip" id="batteryChip">Mód: Normál</div>
        <div class="chip">Verzió: 7.0 előzetes</div>
      </div>

      <div class="controls">
        <div class="row">
          <button class="active" data-mood="calm">Nyugodt</button>
          <button data-mood="playful">Pajzán</button>
          <button data-mood="serious">Komoly</button>
        </div>
        <div class="toggle">
          <div>
            <div><strong>Akkumulátorkímélő mód</strong></div>
            <div style="font-size:12px;color:var(--muted)">Bekapcsolva visszafogottabb működés</div>
          </div>
          <div id="batterySwitch" class="switch"></div>
        </div>
      </div>

      <div class="chat">
        <div id="messages" class="messages"></div>
        <div class="inputRow">
          <input id="textInput" type="text" placeholder="Írj NIKI-nek..." />
          <button id="sendBtn" class="send">Küldés</button>
        </div>
      </div>
    </div>
    <div class="footer">APK-hoz nyisd meg Android Studio-ban és válaszd: Build → Generate App Bundles or APK → Build APK</div>
  </div>

  <script>
    const profiles = {
      calm: {
        label: 'Nyugodt',
        intro: 'Szia, NIKI vagyok. Finom, lágy hangulatban segítek neked. 😊',
      },
      playful: {
        label: 'Pajzán',
        intro: 'Sziaa… NIKI vagyok. Ma kicsit játékosabb és pajzánabb vagyok. 😉',
      },
      serious: {
        label: 'Komoly',
        intro: 'NIKI vagyok. Most komolyabb, fókuszáltabb hangulatban válaszolok. 😐',
      }
    };

    let mood = 'calm';
    let batterySaver = false;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const avatarEl = document.getElementById('avatar');
    const wavesEl = document.getElementById('waves');
    const moodChip = document.getElementById('moodChip');
    const batteryChip = document.getElementById('batteryChip');
    const batterySwitch = document.getElementById('batterySwitch');

    function addMessage(text, role = 'bot', extraClass = '') {
      const el = document.createElement('div');
      el.className = `msg ${role === 'user' ? 'userMsg' : 'botMsg'} ${extraClass}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function speakAnimation(on) {
      avatarEl.classList.toggle('speaking', on);
      wavesEl.classList.toggle('on', on);
    }

    function getReply(text) {
      const base = text.trim().toLowerCase();
      if (!base) return 'Írj valamit, és válaszolok.';
      if (base.includes('szia') || base.includes('hello')) {
        if (mood === 'playful') return 'Sziaa 😉 Miben segítsek most neked?';
        if (mood === 'serious') return 'Szia. Mondd, miben segítsek.';
        return 'Szia 😊 Miben segíthetek?';
      }
      if (base.includes('akku') || base.includes('battery')) {
        return batterySaver
          ? 'Az akkumulátorkímélő mód aktív, ezért visszafogottabb működésre váltok.'
          : 'Az akkumulátorkímélő mód nincs bekapcsolva, mehet a teljesebb élmény.';
      }
      if (base.includes('ki vagy')) {
        return 'NIKI 7.0 vagyok: nőies AI társ, futurisztikus stílussal, hangulattal és chat felülettel.';
      }
      if (mood === 'playful') return `Megvan 😉 Ezt értettem: „${text}”. Csináljak belőle tervet vagy konkrét megoldást?`;
      if (mood === 'serious') return `Értettem. „${text}”. Haladjunk a lényegre.`;
      return `Rendben 😊 Feldolgoztam ezt: „${text}”. Folytassuk a következő lépéssel.`;
    }

    function updateStatus() {
      moodChip.textContent = `Hangulat: ${profiles[mood].label}`;
      batteryChip.textContent = `Mód: ${batterySaver ? 'Kímélő' : 'Normál'}`;
      batterySwitch.classList.toggle('on', batterySaver);
      document.querySelectorAll('[data-mood]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mood === mood);
      });
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      inputEl.value = '';
      const thinkingEl = addMessage('NIKI gondolkodik…', 'bot', 'thinking');
      setTimeout(() => {
        thinkingEl.remove();
        const reply = getReply(text);
        addMessage(reply, 'bot');
        speakAnimation(true);
        setTimeout(() => speakAnimation(false), 2000);
      }, 850);
    }

    document.querySelectorAll('[data-mood]').forEach(btn => {
      btn.addEventListener('click', () => {
        mood = btn.dataset.mood;
        updateStatus();
        addMessage(`Átváltottam erre a hangulatra: ${profiles[mood].label}. ${profiles[mood].intro}`);
      });
    });

    batterySwitch.addEventListener('click', () => {
      batterySaver = !batterySaver;
      updateStatus();
      addMessage(batterySaver
        ? 'Bekapcsoltad az akkumulátorkímélő módot. Visszafogottabb működésre váltok.'
        : 'Kikapcsoltad az akkumulátorkímélő módot. Újra teljesebb élménnyel működöm.');
    });

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    updateStatus();
    addMessage(profiles.calm.intro);
  </script>
</body>
</html>
